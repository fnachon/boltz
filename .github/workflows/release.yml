name: Publish to PyPI

# Builds a source distribution and a pure-Python wheel on every tag push that
# matches v*.*.*, then publishes to PyPI via Trusted Publisher (OIDC).
# No long-lived API token is stored in this repo — PyPI verifies the workflow
# identity via the OIDC binding configured on the PyPI side.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    # Allow re-running a publish manually against an existing tag. The build
    # job re-creates the sdist/wheel from whatever commit the chosen tag/ref
    # points to; PyPI will reject re-uploading the same version, so this is
    # safe against accidental double-publishes.

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Sanity-check artifacts
        run: |
          ls -la dist/
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Environment binding required by PyPI Trusted Publisher. The environment
    # name "pypi" must match the Trusted Publisher configuration on PyPI side.
    environment:
      name: pypi
      url: https://pypi.org/p/boltz-community

    permissions:
      # OIDC: required for Trusted Publisher exchange. No PyPI token needed.
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` field — the action uses OIDC against PyPI's
        # Trusted Publisher binding for this repo + workflow + environment.
